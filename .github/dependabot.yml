version: 2
updates:
  # Go module dependencies.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: build
      include: scope
    groups:
      # Collapse minor/patch bumps into a single PR to cut review churn.
      gomod-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by the workflows in .github/workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
