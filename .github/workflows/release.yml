name: Release

on:
  push:
    branches: [main]

# Least-privilege defaults; per-job overrides narrow further.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # release-please: on every push to main, open or update a release PR that
  # rolls up Conventional Commits into CHANGELOG.md and bumps the version. When
  # that PR is merged, this same job creates the git tag + GitHub release.
  #
  # This repository ships a library (imported via `go get`), so there are no
  # binaries to cross-compile or attach — the git tag is the release artifact.
  # ---------------------------------------------------------------------------
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create tags, releases, commit changelog
      pull-requests: write    # open/update the release PR
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
