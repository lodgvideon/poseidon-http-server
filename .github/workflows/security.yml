name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Mondays 06:00 UTC — catches newly disclosed advisories on cadence.
    - cron: '0 6 * * 1'

# Least privilege at the workflow level; individual jobs widen only what they need.
permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck (with a documented, temporary stdlib allowlist)
        run: |
          # ── Temporary allowlist ──────────────────────────────────────────
          # GO-2026-5856: crypto/tls "Encrypted Client Hello" privacy leak.
          # Fixed in go1.26.5, which is not yet released (this runner is on the
          # 1.26.x line < 1.26.5), so no Go toolchain fixes it yet. Poseidon
          # does NOT use ECH (no EncryptedClientHello configuration anywhere in
          # the tree — grep is clean), so the finding is not exploitable here;
          # it is only reachable through the server's own crypto/tls.Conn
          # Read/Write. REMOVE this allowlist once setup-go picks up go1.26.5+.
          ALLOW="GO-2026-5856"

          # Machine-readable, symbol-level scan. govulncheck exits non-zero when
          # it finds *called* vulns; tolerate that and make our own decision from
          # the findings below so merely-imported (unreachable) vulns never fail.
          json="$(govulncheck -format json ./... || true)"

          # Reachable (called) OSV ids = findings whose call trace resolves to a
          # symbol (any frame has a function). Imported-only findings have no
          # function in their trace and are ignored. Subtract the allowlist;
          # anything left fails the gate — including any NEW vulnerability.
          reachable="$(printf '%s' "$json" \
            | jq -r 'select((.finding.trace? // []) | any(.function != null)) | .finding.osv' \
            | sort -u)"
          unexpected="$(printf '%s\n' "$reachable" | grep -vxF "$ALLOW" | grep -v '^$' || true)"

          echo "reachable vulnerabilities: ${reachable:-<none>}"
          echo "allowlisted (temporary):   $ALLOW"

          if [ -n "$unexpected" ]; then
            echo "::error::govulncheck found reachable vulnerabilities outside the allowlist:"
            echo "$unexpected"
            govulncheck ./... || true   # human-readable report for the log
            exit 1
          fi
          echo "govulncheck: OK — no reachable vulnerabilities outside the documented allowlist."

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Full history so secret scanning can inspect every commit, not just HEAD.
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          artifact-name: poseidon-http-server.spdx.json
          output-file: poseidon-http-server.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom
          path: poseidon-http-server.spdx.json
          if-no-files-found: error
