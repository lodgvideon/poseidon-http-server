name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test + Race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # go.mod has `replace ... => ../poseidon-http-client`, so the sibling repo
      # must exist next to this checkout. Track the same ref local dev uses (main).
      - name: Check out poseidon-http-client (replace target)
        run: git clone --depth 1 https://github.com/lodgvideon/poseidon-http-client.git ../poseidon-http-client

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Download dependencies
        run: go mod download

      - name: Test with race detector
        run: go test -race -count=1 -timeout 60s ./...

      - name: Coverage
        run: |
          go test -count=1 -timeout 60s -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -1

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # go.mod has `replace ... => ../poseidon-http-client`, so the sibling repo
      # must exist next to this checkout. Track the same ref local dev uses (main).
      - name: Check out poseidon-http-client (replace target)
        run: git clone --depth 1 https://github.com/lodgvideon/poseidon-http-client.git ../poseidon-http-client

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: golangci-lint
        # v7+ of the action runs golangci-lint v2, which the .golangci.yml
        # (version: "2" schema) requires. v6 installs the last v1 binary and
        # rejects the v2 config at `config verify`. Pin the linter to match local.
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.3.0
          args: --timeout 5m

  coverage-gate:
    name: Coverage Gate ≥80%
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # go.mod has `replace ... => ../poseidon-http-client`, so the sibling repo
      # must exist next to this checkout. Track the same ref local dev uses (main).
      - name: Check out poseidon-http-client (replace target)
        run: git clone --depth 1 https://github.com/lodgvideon/poseidon-http-client.git ../poseidon-http-client

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Check coverage (library packages, examples/cmd excluded)
        run: |
          go test -count=1 -timeout 60s -coverprofile=coverage.out ./...
          bash scripts/coverage-gate.sh 80 coverage.out

  bench:
    name: Benchmarks (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # go.mod has `replace ... => ../poseidon-http-client`, so the sibling repo
      # must exist next to this checkout. Track the same ref local dev uses (main).
      - name: Check out poseidon-http-client (replace target)
        run: git clone --depth 1 https://github.com/lodgvideon/poseidon-http-client.git ../poseidon-http-client

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      # Smoke-run every benchmark once to catch broken benches, panics, and build
      # breaks. True regression-gating (same-runner before/after via benchstat) is a
      # follow-up — cross-machine absolute baselines are unreliable. Locally:
      # `make bench-gate` (self-baselines on first run).
      - name: Run benchmarks
        run: go test -bench=. -benchmem -benchtime=1x -run='^$' ./...
