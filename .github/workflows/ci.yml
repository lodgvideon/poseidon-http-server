name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test + Race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Download dependencies
        run: go mod download

      - name: Test with race detector
        run: go test -race -count=1 -timeout 60s ./...

      - name: Coverage
        run: |
          go test -count=1 -timeout 60s -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -1

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Download dependencies
        run: go mod download

      # Build golangci-lint v2.3.0 FROM SOURCE with the runner's go1.26 toolchain.
      # The prebuilt v2.3.0 release binary is built with go1.24; its embedded
      # go/types typechecker cannot read go1.26-format export data and panics
      # ("file requires newer Go version go1.26 (application built with go1.24)").
      # `go install` compiles with the go on PATH (go1.26), so the typechecker
      # matches the toolchain — mirroring the local "v2.3.0 built with go1.26.4"
      # setup that lints clean. Pinning v2.3.0 keeps the exact ruleset verified
      # locally (no version bump => no new analyzers). `golangci-lint run` also
      # validates .golangci.yml, so a separate `config verify` step is redundant.
      - name: Install golangci-lint (built with runner Go 1.26)
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.3.0

      - name: golangci-lint
        run: $(go env GOPATH)/bin/golangci-lint run --timeout 5m ./...

  coverage-gate:
    name: Coverage Gate ≥80%
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Check coverage (library packages, examples/cmd excluded)
        run: |
          go test -count=1 -timeout 60s -coverprofile=coverage.out ./...
          bash scripts/coverage-gate.sh 80 coverage.out

  bench:
    name: Benchmarks (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      # Smoke-run every benchmark once to catch broken benches, panics, and build
      # breaks. True regression-gating (same-runner before/after via benchstat) is a
      # follow-up — cross-machine absolute baselines are unreliable. Locally:
      # `make bench-gate` (self-baselines on first run).
      - name: Run benchmarks
        run: go test -bench=. -benchmem -benchtime=1x -run='^$' ./...
