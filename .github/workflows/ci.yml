name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test + Race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Download dependencies
        run: go mod download

      - name: Test with race detector
        run: go test -race -count=1 -timeout 60s ./...

      - name: Coverage
        run: |
          go test -count=1 -timeout 60s -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -1

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout 5m

  coverage-gate:
    name: Coverage Gate ≥80%
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Check coverage
        run: |
          go test -count=1 -timeout 60s -coverprofile=coverage.out ./...
          TOTAL=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          THRESHOLD=80
          if (( $(echo "$TOTAL < $THRESHOLD" | bc -l) )); then
            echo "::error::Coverage ${TOTAL}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
          echo "::notice::Coverage ${TOTAL}% ≥ ${THRESHOLD}% ✅"
