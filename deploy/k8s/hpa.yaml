apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: poseidon-server
  labels:
    app.kubernetes.io/name: poseidon-server
    app.kubernetes.io/instance: poseidon-server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: poseidon-server
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
